name: Publish NuGet

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Bondstone.slnx

      - name: Build
        run: dotnet build Bondstone.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test Bondstone.slnx
          --configuration Release
          --no-build
          --filter "Category=Unit|Category=Application"

      - name: Clean package output
        run: rm -rf artifacts/packages

      - name: Pack
        run: >
          dotnet pack Bondstone.slnx
          --configuration Release
          --no-build
          --output artifacts/packages

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
