name: Semantic PR Title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  title:
    name: Semantic PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Lint pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: >
          printf '%s\n' "$PR_TITLE" |
          npx --yes
          --package @commitlint/cli@21.0.1
          --package @commitlint/config-conventional@21.0.1
          commitlint
          --extends @commitlint/config-conventional
